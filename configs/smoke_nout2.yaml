# Single-GPU test for n_in_timesteps=2 AND n_out_timesteps=2.
# Dummy data (random tensors), so it just checks the channel maths + a real
# forward/backward with a 2-timestep input and a 2-timestep (concatenated)
# target. Validation is skipped because the study-local evaluator assumes
# out_channels == n_variables (1 timestep); the training step is what proves
# n_out_timesteps=2 works.
#
#   srun -n1 --gres=gpu:1 python -u -m era5_levels.main --config configs/smoke_nout2.yaml
#
# Expected: in_channels = 2*36 = 72, out_channels = 2*36 = 72, reaches
# "epoch 0 step 0 ... loss ...".

skip_validation: true

data:
    dt: 6
    train_data_path: "DUMMY_does_not_exist.zarr"   # -> random dummy data
    valid_data_path: "DUMMY_does_not_exist.zarr"
    constant_masks_path: "DUMMY"
    constant_masks: []                              # DummyDataset ignores masks
    normalization_dir: "DUMMY"
    train_time_range: ["2019-01-01", "2019-01-10"]
    valid_time_range: ["2019-01-11", "2019-01-12"]
    train_subset: -1
    valid_subset: -1
    dataset_subsampling: 1
    target_subsampling: 6
    prefetch_factor: 2
    num_workers: 2
    xlat: 120
    xlon: 240
    n_in_timesteps: 2
    n_out_timesteps: 2                              # <-- the thing under test
    pressure_levels: [1000, 850, 500, 250, 50]      # 36 variables

model:
    embedding_dimension: 64
    patch_size: 2
    n_attn_heads: [2, 4, 2]
    n_attn_blocks: [1, 1, 1]
    window_size_outer: [6, 6]
    window_size_inner: [6, 6]
    noise_dim: 8
    nice_norm: False
    latent_rollout: 1
    bayesian: False

training:
    tf32: True
    n_samples: 1
    n_epochs: 1
    batch_size: 1
    lr_scheduler: False
    low_lr: 0.0001
    normal_lr: 0.0001
    dtype: float32
    autocast: False
    timings: False
    checkpoint_interval: 100000
    flash_attn: False

jigsaw:
    parallelism: 1
    type: jigsaw

mesh_dims: [1, 1, 1, 1, 1]
