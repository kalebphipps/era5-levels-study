# Single-GPU test for n_in_timesteps=2 AND n_out_timesteps=2.

skip_validation: true

data:
    dt: 6
    data_path: "DUMMY_does_not_exist.zarr"
    constant_masks_path: "DUMMY"
    constant_masks: []
    normalization_dir: "DUMMY"
    train_time_range: ["2019-01-01", "2019-01-10"]
    valid_time_range: ["2019-01-11", "2019-01-12"]
    train_subset: -1
    valid_subset: -1
    dataset_subsampling: 1
    target_subsampling: 6
    prefetch_factor: 2
    num_workers: 2
    xlat: 120
    xlon: 240
    n_in_timesteps: 2
    n_out_timesteps: 2
    pressure_levels: [1000, 850, 500, 250, 50]

model:
    embedding_dimension: 64
    patch_size: 2
    n_attn_heads: [2, 4, 2]
    n_attn_blocks: [1, 1, 1]
    window_size_outer: [6, 6]
    window_size_inner: [6, 6]
    noise_dim: 8
    nice_norm: False
    latent_rollout: 1
    bayesian: False

training:
    tf32: True
    n_samples: 1
    n_epochs: 1
    batch_size: 1
    lr_scheduler: False
    low_lr: 0.0001
    normal_lr: 0.0001
    dtype: float32
    autocast: False
    timings: False
    checkpoint_interval: 100000
    flash_attn: False

jigsaw:
    parallelism: 1
    type: jigsaw

mesh_dims: [1, 1, 1, 1, 1]
