# Shared core config for the 13-vs-37 study at 0.25 degrees (720 x 1440).
# This file is IDENTICAL for both runs — the only difference comes from the
# levels{13,37}.yaml overlay (pressure_levels + data paths). Keeping everything
# here byte-identical is what makes the comparison fair: only patch_embedding /
# patch_recovery channel counts change, the whole SWIN core is unchanged.

data:
    dt: 6                                   # forecast step in hours (one zarr timestep)
    train_data_path: "PLACEHOLDER.zarr"     # set per-levels in the overlay
    valid_data_path: "PLACEHOLDER.zarr"
    constant_masks_path: "constant_masks"
    constant_masks: ["soil_type_normalized.npy", "topography_normalized.npy", "land_mask.npy"]
    normalization_dir: "PLACEHOLDER"        # dir with norm_mean.npy / norm_std.npy (set in overlay)
    train_time_range: ["2000-01-01", "2018-12-31"]
    valid_time_range: ["2019-01-01", "2019-12-31"]
    train_subset: -1
    valid_subset: -1
    dataset_subsampling: 1
    target_subsampling: 6
    prefetch_factor: 2
    num_workers: 4
    xlat: 720
    xlon: 1440
    n_in_timesteps: 2                       # 1 or 2 supported
    pressure_levels: [1000, 925, 850, 700, 600, 500, 400, 300, 250, 200, 150, 100, 50]
    # ^ default = 13; overridden by the overlay. n_variables / channels are
    #   DERIVED from this list in era5_levels/config.py — do not set them here.

model:
    embedding_dimension: 512                # core width — same for 13 & 37. Raise on H200/Ruby.
    patch_size: 2                           # 720x1440 -> 360x720 latent
    n_attn_heads: [8, 16, 8]
    n_attn_blocks: [1, 1, 1]                # outer / inner / outer SWIN depths
    # Windows below are the hero-proven divisible values for this exact grid +
    # parallelism, so a first run is guaranteed to tile cleanly. They are LARGE
    # (near-global attention) and are your main speed lever: shrink them once a
    # run works, re-checking divisibility on the distributed (jigsaw) layout.
    window_size_outer: [360, 180]
    window_size_inner: [180, 30]
    noise_dim: 32                           # unused when nice_norm: False; kept for ctor
    nice_norm: False                        # deterministic — no NICE noise conditioning
    latent_rollout: 1
    bayesian: False                         # deterministic study
    # n_input_channels / n_output_channels are derived (do not set).

training:
    tf32: True
    n_samples: 1                            # deterministic (no ensemble)
    n_epochs: 1                             # train both runs to the SAME budget
    batch_size: 1
    lr_scheduler: True
    low_lr: 0.00001                         # encoder/decoder conv LR
    normal_lr: 0.0001                       # core LR
    dtype: float32
    autocast: True
    timings: False
    checkpoint_interval: 1000
    flash_attn: True
    # Validation logs per-variable RMSE + persistence/climatology baselines to
    # <results>/metrics.csv each epoch (for offline poster plots). Optionally
    # dump full (lat,lon) prediction/truth/error maps for a few variables:
    # dump_maps_vars: ["geopotential_500", "2m_temperature", "temperature_850"]

jigsaw:
    parallelism: 8                          # = jspatial * jchannel (must match mesh_dims)
    type: jigsaw

# experts, dp, up(sample), jigsaw-spatial, jigsaw-channel  -> product = #GPUs.
# [1,1,1,4,2] = 8 GPUs. experts=1 -> universal expert (no hardcoded level slicing);
# up=1 -> deterministic (no sample parallelism).
mesh_dims: [1, 1, 1, 4, 2]

# Optional frozen-core transfer (leave commented for normal runs):
# transfer:
#     source_checkpoint: "/path/to/other-level-model/checkpoints/cp-....pt"
