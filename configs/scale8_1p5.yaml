# 8-GPU overlay for the 1.5deg study. Stack on base_1p5 + a levels overlay.
#
# At 1.5deg you CANNOT add domain parallelism: jspatial=4 makes the inner window
# undivisible on the 240-longitude grid (width % (jspatial*2*patch*win_inner[1])
# has no even solution). So we scale with DATA parallelism instead: dp=2 runs two
# replicas of the 4-GPU domain-parallel model and DDP-averages their gradients
# -> ~2x throughput, windows unchanged.
#
# Easiest on a single 8-GPU node (accelerated-h200-8) so there's no multi-node
# NCCL: --nodes=1 --ntasks-per-node=8 --gres=gpu:8.
#
#   srun python -u -m era5_levels.main --config configs/base_1p5.yaml \
#       --overlay configs/levels37_1p5.yaml --overlay configs/scale8_1p5.yaml
#
# experts, dp, up, jigsaw-spatial, jigsaw-channel  -> product = 8.
# parallelism (jspatial*jchannel = 4) is inherited from base_1p5 and unchanged.
mesh_dims: [1, 2, 1, 2, 2]
