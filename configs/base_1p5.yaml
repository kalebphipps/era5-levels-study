# Shared core config for the 13-vs-37 study at ~1.5 degrees (120 x 240).
# Same fairness rule as base_0p25: IDENTICAL for both runs except the levels
# overlay (pressure_levels + data paths). At this resolution a plausible,
# baseline-beating global model is trainable in hours-to-days on a few GPUs.
#
#   srun ... --config configs/base_1p5.yaml --overlay configs/levels37_1p5.yaml
#
# Reuses the validated distributed path (parallelism 4, mesh [1,1,1,2,2]); the
# grid is tiny so float32 domain-parallel is plenty fast. Run the dummy
# distributed smoke with --config base_1p5 first to confirm the windows tile.

data:
    dt: 6
    train_data_path: "PLACEHOLDER.zarr"     # set per-levels in the overlay
    valid_data_path: "PLACEHOLDER.zarr"
    # Absolute path so it resolves the same with or without DATA_DIR set. The
    # 1.5deg masks were coarsened from the 0.25deg ones to 120x240 (same grid as
    # the data). Constant masks are level-independent -> identical for 13 and 37.
    constant_masks_path: "/hkfs/work/workspace/scratch/xk5289-level_comparison/era5-levels-study/data/constant_masks_1p5"
    constant_masks: ["soil_type_normalized.npy", "topography_normalized.npy", "land_mask.npy"]
    normalization_dir: "PLACEHOLDER"
    train_time_range: ["2010-01-01", "2019-12-31"]
    valid_time_range: ["2020-01-01", "2020-12-31"]
    train_subset: -1
    valid_subset: -1
    dataset_subsampling: 1
    target_subsampling: 6
    prefetch_factor: 2
    num_workers: 4
    xlat: 120
    xlon: 240
    n_in_timesteps: 2
    n_out_timesteps: 1
    pressure_levels: [1000, 925, 850, 700, 600, 500, 400, 300, 250, 200, 150, 100, 50]
    # ^ default 13; overridden by the overlay. channels are DERIVED from this.

model:
    embedding_dimension: 512                 # cheap grid -> can afford depth/width
    patch_size: 2                            # 120x240 -> 60x120 latent
    n_attn_heads: [8, 16, 8]
    n_attn_blocks: [2, 2, 2]                 # deeper than 0.25deg (grid is cheap) -> more skill
    # Windows for jspatial=2, patch=2, width=240:
    #   window_outer[1] divides 240/(2*2)   = 60   (12 -> 5)
    #   window_inner[1] divides 240/(2*2*2) = 30   ( 6 -> 5)
    window_size_outer: [6, 12]
    window_size_inner: [6, 6]
    noise_dim: 32
    nice_norm: False
    latent_rollout: 1
    bayesian: False

training:
    tf32: True
    n_samples: 1
    n_epochs: 20                             # 1.5deg trains fast; pick the SAME budget for 13 & 37
    batch_size: 1
    lr_scheduler: True
    low_lr: 0.00001
    normal_lr: 0.0001
    dtype: float32
    autocast: False                          # jigsaw custom backward can't mix bf16/float32
    timings: False
    checkpoint_interval: 1000
    flash_attn: True
    # dump_maps_vars: ["geopotential_500", "2m_temperature", "temperature_850"]

jigsaw:
    parallelism: 4
    type: jigsaw

mesh_dims: [1, 1, 1, 2, 2]                    # 4 GPUs = one node
