# Overlay for the 37-level run. Apply on top of base_0p25.yaml:
#   python -m era5_levels.main --config configs/base_0p25.yaml --overlay configs/levels37.yaml
# n_variables = 6 surface + 6 pressure * 37 levels = 228 (derived automatically).
#
# IMPORTANT: this level list and its ORDER must match the `feature` coordinate
# of your 37-level zarr AND your norm_mean.npy / norm_std.npy ordering. It is the
# standard ERA5 37-level set (see era5_levels/variable_layout.PRESSURE_LEVELS_37);
# confirm against your data before training.

data:
    pressure_levels: [1000, 975, 950, 925, 900, 875, 850, 825, 800, 775, 750, 700, 650, 600, 550, 500, 450, 400, 350, 300, 250, 225, 200, 175, 150, 125, 100, 70, 50, 30, 20, 10, 7, 5, 3, 2, 1]
    train_data_path: "era5_37level_train.zarr"   # TODO: path to your 0.25° 37-level zarr
    valid_data_path: "era5_37level_train.zarr"   # TODO: same
    normalization_dir: "data/normalization/0p25"   # 37-level 0.25° norm (228 channels)
