# Overlay for the 13-level run. Apply on top of base_0p25.yaml:
#   python -m era5_levels.main --config configs/base_0p25.yaml --overlay configs/levels13.yaml
# n_variables = 6 surface + 6 pressure * 13 levels = 84 (derived automatically).

data:
    pressure_levels: [1000, 925, 850, 700, 600, 500, 400, 300, 250, 200, 150, 100, 50]
    # The 0.25° 13-level store + norm are not in the repo yet — carve them from
    # the 37-level 0.25° data the same way the 1.5° subset was made
    # (scripts/make_level_subset.py), then point these at the results.
    data_path: "era5_13level_train.zarr"      # TODO: 0.25° 13-level zarr (carve from 37-level; train & valid share it, split by time range)
    normalization_dir: "data/normalization/0p25_13"   # TODO: 84-channel 0.25° norm (carve via make_level_subset.py)
